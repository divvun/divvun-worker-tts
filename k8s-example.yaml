---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: divvun-tts
  namespace: default
  labels:
    app: divvun-tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: divvun-tts
  template:
    metadata:
      labels:
        app: divvun-tts
    spec:
      containers:
      - name: divvun-tts
        image: divvun-worker-tts:latest
        ports:
        - containerPort: 4000
          name: http
        env:
        - name: ADDRESS
          value: "tcp://0.0.0.0:4000"
        args:
        - "/app/bundles"
        volumeMounts:
        - name: bundles-volume
          mountPath: /app/bundles
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: bundles-volume
        persistentVolumeClaim:
          claimName: divvun-tts-bundles-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: divvun-tts-service
  namespace: default
  labels:
    app: divvun-tts
spec:
  selector:
    app: divvun-tts
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 4000
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: divvun-tts-bundles-pvc
  namespace: default
spec:
  accessModes:
  - ReadOnlyMany
  resources:
    requests:
      storage: 10Gi
  # Uncomment and modify based on your storage class
  # storageClassName: your-storage-class